<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pengumuman SPMB 2026/2027</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#f4f7fb;
    margin:0;
    padding:20px;
}

.container{
    max-width:700px;
    margin:auto;
    background:white;
    padding:30px;
    border-radius:15px;
    box-shadow:0 0 15px rgba(0,0,0,0.1);
    text-align:center;
}

h1{
    color:#0d47a1;
}

input{
    width:90%;
    padding:12px;
    margin-top:15px;
    border:1px solid #ccc;
    border-radius:8px;
}

button{
    margin-top:10px;
    padding:12px 20px;
    border:none;
    border-radius:8px;
    background:#1976d2;
    color:white;
    cursor:pointer;
}

button:hover{
    background:#0d47a1;
}

.kartu{
    margin-top:20px;
    border:2px solid #4caf50;
    border-radius:10px;
    padding:20px;
    background:#f1fff1;
}

.status{
    color:green;
    font-size:22px;
    font-weight:bold;
}

.error{
    margin-top:20px;
    background:#ffebee;
    color:red;
    padding:15px;
    border-radius:10px;
}
</style>
</head>
<body>

<div class="container">

<h1>PENGUMUMAN SPMB</h1>

<h2>SMK APVI NUNGGAL MAJU JAYA</h2>

<p>Tahun Pelajaran 2026/2027</p>

<input type="text" id="nama" placeholder="Masukkan Nama Siswa">

<br>

<button onclick="cekHasil()">
Cari Hasil
</button>

<div id="hasil"></div>

</div>

<script>

const dataSiswa = {
    "Indri Kirani Nurlita":"Teknik Sepeda Motor (TSM)",
    "Melinda Sari":"Desain Komunikasi Visual (DKV)",
    "Bagas Alfiyansyah":"Teknik Sepeda Motor (TSM)",
    "Rizky Ramadhan":"Teknik Sepeda Motor (TSM)"
};

function cekHasil(){

    let keyword =
    document.getElementById("nama")
    .value
    .trim()
    .toLowerCase();

    let hasil =
    document.getElementById("hasil");

    if(keyword==""){
        hasil.innerHTML =
        "<div class='error'>Masukkan nama siswa terlebih dahulu.</div>";
        return;
    }

    let ditemukan = false;

    for(let nama in dataSiswa){

        if(nama.toLowerCase().includes(keyword)){

            ditemukan = true;

            hasil.innerHTML = `
            <div class="kartu">
                <h2>🎉 SELAMAT 🎉</h2>

                <p>
                Anda dinyatakan diterima di
                <b>SMK APVI NUNGGAL MAJU JAYA</b>
                </p>

                <hr>

                <p><b>Nama:</b><br>${nama}</p>

                <p><b>Jurusan:</b><br>${dataSiswa[nama]}</p>

                <p class="status">
                DITERIMA
                </p>
            </div>
            `;

            break;
        }
    }

    if(!ditemukan){

        hasil.innerHTML = `
        <div class="error">
            Nama siswa tidak ditemukan.
        </div>
        `;
    }
}

document
.getElementById("nama")
.addEventListener("keyup", function(event){
    if(event.key === "Enter"){
        cekHasil();
    }
});

</script>

</body>
</html>
