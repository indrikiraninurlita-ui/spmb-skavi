
<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pengumuman SPMB SMK APVI Nunggal Maju Jaya 2026/2027</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    min-height:100vh;
    background:linear-gradient(135deg,#0f4c81,#1e88e5,#42a5f5);
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}

.container{
    width:100%;
    max-width:850px;
    background:white;
    border-radius:20px;
    padding:35px;
    text-align:center;
    box-shadow:0 15px 35px rgba(0,0,0,0.2);
}

.logo{
    width:140px;
    margin-bottom:15px;
}

.judul{
    color:#0f4c81;
    margin-bottom:5px;
}

.subjudul{
    color:#555;
    margin-bottom:20px;
}

.info{
    background:#e3f2fd;
    color:#0d47a1;
    padding:15px;
    border-radius:10px;
    margin-bottom:20px;
}

input{
    width:100%;
    padding:15px;
    border:2px solid #ccc;
    border-radius:10px;
    font-size:16px;
}

input:focus{
    outline:none;
    border-color:#1e88e5;
}

button{
    width:100%;
    margin-top:15px;
    padding:15px;
    border:none;
    border-radius:10px;
    background:#1565c0;
    color:white;
    font-size:16px;
    font-weight:bold;
    cursor:pointer;
}

button:hover{
    background:#0d47a1;
}

#hasil{
    margin-top:25px;
}

.kartu{
    background:white;
    border-top:8px solid #4caf50;
    border-radius:15px;
    padding:30px;
    box-shadow:0 5px 20px rgba(0,0,0,0.15);
    animation:muncul .5s ease;
}

.error{
    background:#fff1f1;
    border-left:6px solid red;
    border-radius:10px;
    padding:20px;
}

.footer{
    margin-top:25px;
    color:#666;
    font-size:14px;
}

@keyframes muncul{
    from{
        opacity:0;
        transform:translateY(20px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}
</style>
</head>
<body>

<div class="container">

    <!-- Ganti dengan logo sekolah -->
    <img src="logo.png" class="logo" alt="Logo Sekolah">

    <h1 class="judul">PENGUMUMAN
        <br>SELEKSI PENERIMAAN MURID BARU (SPMB)
    </h1>

    <h2 class="subjudul">
        SMK APVI NUNGGAL MAJU JAYA<br>
        Tahun Ajaran 2026/2027
    </h2>

    <div class="info">
        Masukkan nama siswa untuk melihat hasil 
        .
    </div>

    <input type="text" id="nama" placeholder="Contoh: Melinda">

    <button onclick="cekHasil()">🔍 Cari Hasil</button>

    <div id="hasil"></div>

    <div class="footer">
        © 2026 SMK APVI Nunggal Maju Jaya
    </div>

</div>

<script>

const dataSiswa = {

"Melinda Sari":"Desain Komunikasi Visual (DKV)",
"Sesil Aprilia Nggrayini":"Desain Komunikasi Visual (DKV)",
"Riska Amelia":"Desain Komunikasi Visual (DKV)",
"Nisa Azahra":"Desain Komunikasi Visual (DKV)",
"Feby Nurmala Sari":"Desain Komunikasi Visual (DKV)",
"Ester Rindu Asmarani":"Desain Komunikasi Visual (DKV)",
"Reni Fitri Ana":"Desain Komunikasi Visual (DKV)",
"Alvira Aprilia":"Desain Komunikasi Visual (DKV)",
"Denis Anju Maranata P":"Desain Komunikasi Visual (DKV)",

"Revan Andrianto":"Teknik Sepeda Motor (TSM)",
"Bagas Alfiyansyah":"Teknik Sepeda Motor (TSM)",
"Riski Rahmadani":"Teknik Sepeda Motor (TSM)",
"Syahril Indriyansyah":"Teknik Sepeda Motor (TSM)",
"Rizky Ramadhan":"Teknik Sepeda Motor (TSM)",
"Revan Radittia":"Teknik Sepeda Motor (TSM)",
"Ferdiansyah":"Teknik Sepeda Motor (TSM)",
"Alfian Nurizki":"Teknik Sepeda Motor (TSM)",
"Faiz Lutfi Pratama":"Teknik Sepeda Motor (TSM)",
"Yogi Saputra":"Teknik Sepeda Motor (TSM)",
"Alviano Wira Kusuma":"Teknik Sepeda Motor (TSM)"

};

function cekHasil(){

    const keyword = document.getElementById("nama").value.trim().toLowerCase();

    const hasil = document.getElementById("hasil");

    let output = "";

    for(let nama in dataSiswa){

        if(nama.toLowerCase().includes(keyword)){

            output += `
            <div class="kartu">

                <h1 style="
                text-align:center;
                color:#2e7d32;
                font-size:42px;
                margin-bottom:15px;">
                🎉 SELAMAT 🎉
                </h1>

                <p style="
                text-align:center;
                font-size:20px;
                margin-bottom:25px;
                line-height:1.8;">
                Anda dinyatakan <b>DI TERIMA</b><br>
                Seleksi Penerimaan Murid Baru (SPMB)<br>
                SMK APVI Nunggal Maju Jaya<br>
                Tahun Ajaran 2026/2027
                </p>

                <hr style="margin:20px 0;">

                <div style="
                text-align:center;
                line-height:2;">

                    <p style="font-size:22px;">
                        <b>Nama Siswa</b><br>
                        ${nama}
                    </p>

                    <p style="font-size:22px;">
                        <b>Jurusan</b><br>
                        ${dataSiswa[nama]}
                    </p>

                    <p style="font-size:22px;">
                        <b>Status</b><br>
                        <span style="
                        color:#2e7d32;
                        font-weight:bold;
                        font-size:28px;">
                        DI TERIMA
                        </span>
                    </p>

                </div>

            </div>
            `;
        }
    }

    if(output !== ""){
        hasil.innerHTML = output;
    }else{
        hasil.innerHTML = `
        <div class="error">
            <h3>❌ DATA TIDAK DITEMUKAN</h3>
            <p>Nama yang Anda masukkan tidak terdaftar.</p>
        </div>
        `;
    }
}

document.getElementById("nama").addEventListener("keypress", function(e){
    if(e.key === "Enter"){
        cekHasil();
    }
});

</script>

</body>
</html>
