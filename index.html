<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pengumuman SPMB SMK APVI Nunggal Maju Jaya 2026/2027</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:linear-gradient(135deg,#0d47a1,#1976d2,#42a5f5);
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}

.container{
    width:100%;
    max-width:800px;
    background:white;
    border-radius:20px;
    padding:30px;
    text-align:center;
    box-shadow:0 10px 30px rgba(0,0,0,.2);
}

.logo{
    width:130px;
    margin-bottom:15px;
}

h1{
    color:#0d47a1;
    margin-bottom:5px;
}

h2{
    color:#555;
    font-size:18px;
    margin-bottom:20px;
}

.info{
    background:#e3f2fd;
    color:#0d47a1;
    padding:12px;
    border-radius:10px;
    margin-bottom:20px;
}

input{
    width:100%;
    padding:15px;
    border:2px solid #ddd;
    border-radius:10px;
    font-size:16px;
}

button{
    width:100%;
    padding:15px;
    margin-top:15px;
    border:none;
    border-radius:10px;
    background:#1565c0;
    color:white;
    font-size:16px;
    font-weight:bold;
    cursor:pointer;
}

button:hover{
    background:#0d47a1;
}

#hasil{
    margin-top:20px;
}

.kartu{
    background:white;
    border-top:8px solid #4caf50;
    border-radius:15px;
    padding:25px;
    box-shadow:0 5px 15px rgba(0,0,0,.15);
}

.sukses{
    font-size:40px;
    color:#2e7d32;
    margin-bottom:15px;
}

.keterangan{
    font-size:18px;
    line-height:1.8;
    margin-bottom:20px;
}

.data{
    text-align:center;
    line-height:2;
}

.data p{
    font-size:20px;
}

.status{
    color:#2e7d32;
    font-weight:bold;
    font-size:26px;
}

.error{
    background:#ffebee;
    border-radius:10px;
    padding:20px;
    color:red;
}

.footer{
    margin-top:20px;
    color:#666;
    font-size:14px;
}

/* RESPONSIVE HP */
@media(max-width:600px){

    .container{
        padding:20px;
    }

    .logo{
        width:90px;
    }

    h1{
        font-size:24px;
    }

    h2{
        font-size:15px;
    }

    .sukses{
        font-size:28px;

        font-size:15px;

</style>
</head>
<body>

<div class="container">

<img src="logo.png" class="logo" alt="Logo Sekolah">

<h1>PENGUMUMAN SPMB</h1>

<h2>
SMK APVI NUNGGAL MAJU JAYA<br>
TAHUN AJARAN 2026/2027
</h2>

<div class="info">
Masukkan nama siswa untuk melihat hasil pengumuman.
</div>

<input type="text" id="nama" placeholder="Contoh: Melinda">

<button onclick="cekHasil()">🔍 Cari Hasil</button>

<div id="hasil"></div>

<div class="footer">
© 2026 SMK APVI Nunggal Maju Jaya
</div>

</div>

<script>

const dataSiswa = {

"Melinda Sari":"Desain Komunikasi Visual (DKV)",
"Sesil Aprilia Nggrayini":"Desain Komunikasi Visual (DKV)",
"Riska Amelia":"Desain Komunikasi Visual (DKV)",
"Nisa Azahra":"Desain Komunikasi Visual (DKV)",

"Revan Andrianto":"Teknik Sepeda Motor (TSM)",
"Bagas Alfiyansyah":"Teknik Sepeda Motor (TSM)",
"Riski Rahmadani":"Teknik Sepeda Motor (TSM)",
"Syahril Indriyansyah":"Teknik Sepeda Motor (TSM)"

};

function cekHasil(){

let keyword =
document.getElementById("nama")
.value
.trim()
.toLowerCase();

let hasil =
document.getElementById("hasil");

let output = "";

for(let nama in dataSiswa){

if(nama.toLowerCase().includes(keyword)){

output += `
<div class="kartu">

<div class="sukses">
🎉 SELAMAT 🎉
</div>

<div class="keterangan">
Anda dinyatakan <b>LULUS</b><br>
Seleksi Penerimaan Murid Baru (SPMB)<br>
SMK APVI Nunggal Maju Jaya<br>
Tahun Ajaran 2026/2027
</div>

<hr><br>

<div class="data">

<p>
<b>Nama Siswa</b><br>
${nama}
</p>

<p>
<b>Jurusan</b><br>
${dataSiswa[nama]}
</p>

<p>
<b>Status</b><br>
<span class="status">
LULUS
</span>
</p>

</div>

</div>
`;
}

}

if(output!=""){
hasil.innerHTML = output;
}
else{
hasil.innerHTML = `
<div class="error">
<h3>❌ DATA TIDAK DITEMUKAN</h3>
<p>Nama yang dicari tidak terdaftar.</p>
</div>
`;
}

}

document.getElementById("nama").addEventListener("keypress",function(e){
if(e.key==="Enter"){
cekHasil();
}
});

</script>

</body>
</html>
