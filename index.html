
<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Pengumuman SPMB SMK APVI Nunggal Maju Jaya 2026/2027</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Segoe UI, sans-serif;
}

body{
    background:linear-gradient(135deg,#0f4c81,#1e88e5,#42a5f5);
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:15px;
}

.container{
    width:100%;
    max-width:800px;
    background:#fff;
    border-radius:20px;
    padding:35px;
    text-align:center;
    box-shadow:0 10px 30px rgba(0,0,0,.2);
}

.logo{
    width:130px;
    margin-bottom:15px;
}

.judul{
    color:#0f4c81;
    font-size:34px;
    line-height:1.4;
    margin-bottom:10px;
}

.subjudul{
    color:#555;
    font-size:20px;
    margin-bottom:20px;
    line-height:1.5;
}

.info{
    background:#e3f2fd;
    color:#0d47a1;
    padding:15px;
    border-radius:10px;
    margin-bottom:20px;
}

input{
    width:100%;
    padding:15px;
    border:2px solid #ddd;
    border-radius:10px;
    font-size:16px;
}

button{
    width:100%;
    padding:15px;
    margin-top:15px;
    border:none;
    border-radius:10px;
    background:#1565c0;
    color:white;
    font-size:16px;
    font-weight:bold;
    cursor:pointer;
}

button:hover{
    background:#0d47a1;
}

.kartu{
    margin-top:20px;
    background:white;
    border-top:8px solid #4caf50;
    border-radius:15px;
    padding:25px;
    box-shadow:0 5px 15px rgba(0,0,0,.15);
}

.sukses{
    color:#2e7d32;
    font-size:40px;
    margin-bottom:15px;
}

.data{
    text-align:center;
    line-height:2;
}

.data p{
    font-size:20px;
}

.status{
    color:#2e7d32;
    font-size:28px;
    font-weight:bold;
}

.error{
    margin-top:20px;
    background:#ffebee;
    padding:20px;
    border-radius:10px;
    color:red;
}

.footer{
    margin-top:20px;
    color:#666;
    font-size:14px;
}

/* RESPONSIVE HP */
@media(max-width:600px){

    .container{
        padding:20px;
    }

    .logo{
        width:90px;
    }

    .judul{
        font-size:22px;
    }

    .subjudul{
        font-size:15px;
    }

    .info{
        font-size:14px;
    }

    input,button{
        font-size:14px;
    }

    .sukses{
        font-size:28px;
    }

    .data p{
        font-size:16px;
    }

    .status{
        font-size:20px;
    }
}

</style>
</head>
<body>

<div class="container">

<img src="logosmk.png" class="logo" alt="Logo Sekolah">

<h1 class="judul">
PENGUMUMAN<br>
SELEKSI PENERIMAAN<br>
MURID BARU (SPMB)
</h1>

<h2 class="subjudul">
SMK APVI NUNGGAL MAJU JAYA<br>
Tahun Ajaran 2026/2027
</h2>

<div class="info">
Masukkan nama siswa untuk melihat hasil pengumuman.
</div>

<input type="text" id="nama" placeholder="Masukkan nama siswa">

<button onclick="cekHasil()">🔍 Cari Hasil</button>

<div id="hasil"></div>

<div class="footer">
© 2026 SMK APVI Nunggal Maju Jaya
</div>

</div>

<script>

const dataSiswa = {

"Melinda Sari":"Desain Komunikasi Visual (DKV)",
"Sesil Aprilia Nggrayini":"Desain Komunikasi Visual (DKV)",
"Riska Amelia":"Desain Komunikasi Visual (DKV)",
"Nisa Azahra":"Desain Komunikasi Visual (DKV)",

"Revan Andrianto":"Teknik Sepeda Motor (TSM)",
"Bagas Alfiyansyah":"Teknik Sepeda Motor (TSM)",
"Riski Rahmadani":"Teknik Sepeda Motor (TSM)"

};

function cekHasil(){

let keyword =
document.getElementById("nama")
.value
.toLowerCase()
.trim();

let hasil =
document.getElementById("hasil");

let output = "";

for(let nama in dataSiswa){

if(nama.toLowerCase().includes(keyword)){

output += `
<div class="kartu">

<div class="sukses">
🎉 SELAMAT 🎉
</div>

<p>
Anda dinyatakan <b>DI TERIMA</b><br>
Seleksi Penerimaan Murid Baru (SPMB)<br>
SMK APVI Nunggal Maju Jaya<br>
Tahun Ajaran 2026/2027
</p>

<hr style="margin:20px 0;">

<div class="data">

<p>
<b>Nama Siswa</b><br>
${nama}
</p>

<p>
<b>Jurusan</b><br>
${dataSiswa[nama]}
</p>

<p>
<b>Status</b><br>
<span class="status">DI TERIMA</span>
</p>

</div>

</div>
`;
}

}

if(output){
hasil.innerHTML = output;
}else{
hasil.innerHTML = `
<div class="error">
<h3>❌ DATA TIDAK DITEMUKAN</h3>
<p>Nama yang dicari tidak terdaftar.</p>
</div>
`;
}

}

</script>

</body>
</html>
